version: '3.8'

services:
  db:
    image: postgis/postgis:17-3.4 # Using PostgreSQL 16 and PostGIS 3.4
    container_name: postgis_offers_db
    environment:
      POSTGRES_USER: offer_user
      POSTGRES_PASSWORD: offer_password
      POSTGRES_DB: offers_db
      # PGDATA: /var/lib/postgresql/data/pgdata # Optional: if you want to change default PGDATA inside container
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # ports:
    #   - "5432:5432" # Map host port to container port if external access needed, otherwise internal only
    restart: unless-stopped
    healthcheck: # Optional: Basic healthcheck for PostgreSQL
      test: ["CMD-SHELL", "pg_isready -U offer_user -d offers_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    container_name: fastapi_offers_app
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app # Mount current directory to /app in container for development (hot reload)
    environment:
      - PGDATABASE=offers_db
      - PGUSER=offer_user
      - PGPASSWORD=offer_password
      - PGHOST=db # Service name of the database container
      - PGPORT=5432
      # For Uvicorn reload if CMD in Dockerfile is changed to use it:
      # - WATCHFILES_FORCE_POLLING=true
    depends_on:
      db:
        condition: service_healthy # Wait for db to be healthy if healthcheck is defined and reliable
        # Or use a simple depends_on: db and handle wait in app startup
    # The command in the Dockerfile will be used:
    # CMD ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000"]
    # For development with reload, you might override the command here:
    # command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app

volumes:
  postgres_data:
    driver: local
